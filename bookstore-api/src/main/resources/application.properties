# Application Configuration
spring.application.name=bookstore-api
server.port=8080

# PostgreSQL Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/bookstore_db
spring.datasource.username=
spring.datasource.password=
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT Configuration
jwt.secret=
jwt.expiration=900000
jwt.refresh-expiration=604800000

# Security Configuration
security.account-lockout.max-attempts=5
security.account-lockout.duration-minutes=15
security.session.timeout-minutes=30

# Logging
logging.level.org.springframework.security=DEBUG
logging.level.com.bookstore=DEBUG
